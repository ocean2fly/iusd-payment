<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <!--
    iPAY Logo — SVG recreation
    Color: #374151 (dark charcoal)
    Cap height: 64px (y=8 to y=72), baseline y=72
    Stroke weight: ~12px (≈18% of cap height)
  -->

  <!-- i — oversized circle dot + stem with rounded bottom-left corner -->
  <circle cx="20" cy="16" r="8" fill="#374151"/>
  <path d="M12 28 L28 28 L28 72 Q28 72 28 72 L12 72 Q12 72 12 72 Q8 72 8 68 L8 28 Z"
        fill="#374151"/>
  <!-- rounded bottom-left on i stem -->
  <path d="M8 28 L28 28 L28 72 L12 72 Q8 72 8 68 Z" fill="#374151"/>

  <!-- P — vertical stroke + bowl -->
  <rect x="40" y="8" width="14" height="64" rx="2" fill="#374151"/>
  <!-- P bowl: from (54,8) curves right to (54,44) -->
  <path d="M54 8 Q92 8 92 26 Q92 44 54 44 Z" fill="#374151"/>
  <!-- P counter cutout -->
  <path d="M54 20 Q80 20 80 26 Q80 32 54 32 Z" fill="#F5F3FF"/>

  <!-- A — two diagonal strokes + crossbar -->
  <!-- left leg -->
  <polygon points="104,72 118,72 148,8 134,8" fill="#374151"/>
  <!-- right leg -->
  <polygon points="148,8 162,8 192,72 178,72" fill="#374151"/>
  <!-- crossbar at ~40% height from baseline -->
  <rect x="116" y="46" width="60" height="12" fill="#374151"/>

  <!-- >> double chevron (the signature symbol, reads as Y from distance) -->
  <!-- Left chevron: points at x=230, strokes width ~12 -->
  <polygon points="210,8 222,8 244,38 222,72 210,72 232,38" fill="#374151"/>
  <!-- Right chevron: offset ~22px right -->
  <polygon points="232,8 244,8 266,38 244,72 232,72 254,38" fill="#374151"/>
</svg>
