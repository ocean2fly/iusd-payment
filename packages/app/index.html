  <body>
    <div id="root"></div>
    <!-- Polyfill ES2023 Array.prototype.toSorted for Safari<16.4 / Chrome<110 /
         Firefox<115. @initia/interwovenkit-react ships toSorted in its built
         bundle; without this shim the chain-list render crashes on older
         browsers. Classic script runs before the module below. -->
    <script>
      if (!Array.prototype.toSorted) {
        Array.prototype.toSorted = function (compareFn) {
          return this.slice().sort(compareFn);
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
